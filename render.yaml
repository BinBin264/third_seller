services:
  - type: web
    name: third-seller-bot
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: DB_PATH
        value: /tmp/shop.db
      - key: TELETHON_SESSION_PATH
        value: /tmp/telethon_session
      - key: SYNC_DELAY
        value: "1.0"
      - key: MENU_LIMIT
        value: "0"
